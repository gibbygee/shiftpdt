---
layout: default
---

<div class="page">
  <div class="container">
    {% if page.title and page.hide_title != true %}
      <header class="page-header">
        <h1>{{ page.title }}</h1>
      </header>
    {% endif %}

    <div class="page-content">
      {{ content }}
    </div>
  </div>
</div>
